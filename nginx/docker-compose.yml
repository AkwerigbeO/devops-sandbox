version: "3.8"

services:
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d # ← writable, scripts write here
    extra_hosts:
      - "host.docker.internal:host-gateway" # ← lets Nginx reach host ports
    restart: unless-stopped
